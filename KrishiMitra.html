        function showModal(title, message) {
            const modalContainer = document.getElementById('modal-container');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const modalOkBtn = document.getElementById('modal-ok-btn');

            modalTitle.textContent = title;
            modalMessage.textContent = message;
            modalContainer.classList.remove('hidden');

            modalOkBtn.onclick = () => {
                modalContainer.classList.add('hidden');
            };
        }

        function getLiveLocation() {
            const locationDisplay = document.getElementById('location-display');
            if (!locationDisplay) {
                return;
            }
            locationDisplay.textContent = '...loading';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        currentLocation = `Lat: ${latitude.toFixed(2)}, Lon: ${longitude.toFixed(2)}`;
                        renderApp();
                    },
                    (error) => {
                        console.error('Geolocation Error:', error);
                        let errorMessage = 'Unable to get your location.';
                        if (error.code === 1) {
                            errorMessage = 'Please allow location access to use this feature.';
                        }
                        showModal('Location Error', errorMessage);
                        currentLocation = 'Kochi, Kerala'; // Revert to default
                        renderApp();
                    }
                );
            } else {
                showModal('Location Not Supported', 'Geolocation is not supported by your browser.');
                currentLocation = 'Kochi, Kerala'; // Revert to default
                renderApp();
            }
        }

        function sendMessage() {
            const t = content[language];
            const messageInput = document.getElementById('message-input');
            const userMessage = messageInput.value.trim();
            if (!userMessage) return;

            chatMessages.push({ type: 'user', message: userMessage });
            messageInput.value = '';
            updateChatbox();

            setTimeout(() => {
                const randomResponse = t.chatbot.responses[Math.floor(Math.random() * t.chatbot.responses.length)];
                chatMessages.push({ type: 'bot', message: randomResponse });
                updateChatbox();
            }, 1000);
        }

        function updateChatbox() {
            const chatBody = document.getElementById('chat-body');
            if (!chatBody) return;
            const t = content[language];
            chatBody.innerHTML = chatMessages.map(msg => `

                    <div class="max-w-xs p-3 rounded-lg ${msg.type === 'user' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-800'}">
                        <p class="text-sm">${msg.message}</p>

                </div>
            `).join('');
            chatBody.scrollTop = chatBody.scrollHeight;

        function renderCropTab() {
            const t = content[language];
            return `
                <div class="space-y-6">
                    <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-xl p-6 text-white">
                        <h3 class="text-xl font-semibold mb-2">${t.crops.title}</h3>
                        <p class="text-green-100">${t.crops.subtitle}</p>
                    </div>
                    <div class="space-y-4">
                        ${t.crops.cropData.map(crop => `
                            <div class="bg-white p-4 rounded-lg shadow">
                                <div class="flex items-center justify-between mb-2">
                                    <div class="flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-green-500"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 18.2 8.3 22 12c-2.4 2.1-5.1 3.2-8.5 3.2-1.9 0-3.8-.5-5.6-1.5-.9-.5-1.7-1.2-2.5-2"/><path d="M2 13.5a14 14 0 0 0 7 7c1 0 2-.4 3-1"/><path d="M11 18a14.2 14.2 0 0 0 6.5 2.5c2.3 0 4.5-1 6.5-3.5"/></svg>

        function renderMarketTab() {
            const t = content[language];
            return `
                <div class="space-y-6">
                    <div class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-xl p-6 text-white">
                        <h3 class="text-xl font-semibold mb-2">${t.market.title}</h3>
                        <p class="text-purple-100">${t.market.subtitle}</p>
                    </div>
                    <div class="space-y-4">
                        ${t.market.marketData.map(item => `
                            <div class="bg-white p-4 rounded-lg shadow">

                                    <div>
                                        <h4 class="font-semibold text-gray-800">${item.item}</h4>
                                        <p class="text-2xl font-bold text-gray-900">${item.price}</p>
                                    </div>
                                    <div class="text-right ${item.trend === 'up' ? 'text-green-600' : item.trend === 'down' ? 'text-red-600' : 'text-gray-600'}">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 ${item.trend === 'down' ? 'transform rotate-180' : ''}"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                                        <span class="text-sm font-medium">${item.change}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderSchemeTab() {
            const t = content[language];
            return `
                <div class="space-y-6">
                    <div class="bg-gradient-to-r from-indigo-500 to-indigo-600 rounded-xl p-6 text-white">
                        <h3 class="text-xl font-semibold mb-2">${t.schemes.title}</h3>
                        <p class="text-indigo-100">${t.schemes.subtitle}</p>
                    </div>
                    <div class="space-y-4">
                        ${t.schemes.schemeData.map(scheme => `
                            <div class="bg-white p-4 rounded-lg shadow">
                                <div class="flex items-center justify-between mb-2">
                                    <h4 class="font-semibold text-gray-800">${scheme.name}</h4>
                                    <span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-medium">${scheme.status}</span>

        }

        function renderChatbot() {
            const t = content[language];
            const chatboxClass = showChatbot ? 'w-80 h-96' : 'w-auto h-auto';
            return `
                <div id="chatbot-container" class="fixed bottom-4 right-4 ${chatboxClass} transition-all duration-300 z-50">
                    ${!showChatbot ? `
                        <button id="chatbot-toggle-btn" class="bg-green-600 text-white p-4 rounded-full shadow-lg hover:bg-green-700 transition duration-200">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        </button>` : `
                        <div class="bg-white rounded-lg shadow-2xl border overflow-hidden">
                            <div class="bg-green-600 text-white p-4 flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M12 8V4H8"/><path d="M12 16V20H8"/><path d="M8 8H4"/><path d="M8 16H4"/><path d="M16 8H20"/><path d="M16 16H20"/><path d="M12 12H16"/><path d="M12 12V8"/><path d="M12 12V16"/></svg>
                                    <span class="font-medium">${t.chatbot.title}</span>
                                </div>
                                <button id="chatbot-close-btn" class="text-white hover:text-gray-200">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                </button>
                            </div>
                            <div id="chat-body" class="h-64 overflow-y-auto p-4 space-y-3"></div>
                            <div class="p-4 border-t">
                                <div class="flex gap-2">
                                    <input id="message-input" type="text" placeholder="${t.chatbot.placeholder}" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm"/>
                                    <button id="send-btn" class="bg-green-600 text-white p-2 rounded-lg hover:bg-green-700 transition duration-200">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="m22 2-7 18-4-8-8-4 18-7Z"/><path d="M22 2 11 13"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>`}
                </div>
            `;
        }
        
        function renderHomeFooter() {
            const t = content[language];
            return `
                <footer class="bg-white border-t mt-16">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div>
                                <div class="flex items-center gap-2 mb-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-green-600"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 18.2 8.3 22 12c-2.4 2.1-5.1 3.2-8.5 3.2-1.9 0-3.8-.5-5.6-1.5-.9-.5-1.7-1.2-2.5-2"/><path d="M2 13.5a14 14 0 0 0 7 7c1 0 2-.4 3-1"/><path d="M11 18a14.2 14.2 0 0 0 6.5 2.5c2.3 0 4.5-1 6.5-3.5"/></svg>
                                    <h3 class="text-lg font-semibold text-gray-800">${t.appName}</h3>
                                </div>
                                <p class="text-gray-600 text-sm">${t.footer.description}</p>
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800 mb-4">${t.footer.links}</h4>
                                <ul class="space-y-2 text-sm text-gray-600">
                                    ${t.footer.linkItems.map(item => `<li><a href="#" class="hover:text-green-600 transition-colors">${item}</a></li>`).join('')}
                                </ul>
                            </div>
                            <div>
                                <h4 class="font-semibold text-gray-800 mb-4">${t.footer.legal}</h4>
                                <ul class="space-y-2 text-sm text-gray-600">
                                    ${t.footer.legalItems.map(item => `<li><a href="#" class="hover:text-green-600 transition-colors">${item}</a></li>`).join('')}
                                </ul>
                            </div>
                        </div>
                        <div class="border-t mt-8 pt-8 text-center text-sm text-gray-500">
                            <p>${t.footer.copyright}</p>
                        </div>
                    </div>
                </footer>
            `;
        }

        function renderHome() {
            let mainContent = '';
            const t = content[language];
            if (activeTab === 'weather') mainContent = renderWeatherTab();
            if (activeTab === 'soil') mainContent = renderSoilTab();
            if (activeTab === 'crops') mainContent = renderCropTab();
            if (activeTab === 'market') mainContent = renderMarketTab();
            if (activeTab === 'schemes') mainContent = renderSchemeTab();

            return `
                <div class="min-h-screen bg-gray-50">
                    ${renderHomeHeader()}
                    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        ${mainContent}
                    </main>
                    ${renderHomeFooter()}
                    ${renderChatbot()}
                </div>
            `;
        }

        function renderApp() {
            const appDiv = document.getElementById('app');
            let contentToRender = '';

            if (currentScreen === 'login') {
                contentToRender = renderLoginScreen();
            } else if (currentScreen === 'greeting') {
                contentToRender = renderGreetingScreen();
            } else if (currentScreen === 'flashcards') {
                contentToRender = renderFlashcardsScreen();
            } else if (currentScreen === 'home') {
                contentToRender = renderHome();
            }

            appDiv.innerHTML = contentToRender;
            attachEventListeners();
        }

        function attachEventListeners() {
            const t = content[language];
            // Language toggle
            const langToggleBtn = document.getElementById('lang-toggle-btn');
            if (langToggleBtn) {
                langToggleBtn.onclick = toggleLanguage;
            }

            // Login Screen
            const nameInput = document.getElementById('name-input');
            const phoneInput = document.getElementById('phone-input');
            const otpInput = document.getElementById('otp-input');
            const loginBtn = document.getElementById('login-btn');
            const googleLoginBtn = document.getElementById('google-login-btn');

            if (nameInput) nameInput.oninput = (e) => { loginData.name = e.target.value; };
            if (phoneInput) phoneInput.oninput = (e) => { loginData.phone = e.target.value; };
            if (otpInput) otpInput.oninput = (e) => { loginData.otp = e.target.value; };
            if (loginBtn) loginBtn.onclick = handleLogin;
            if (googleLoginBtn) googleLoginBtn.onclick = handleGoogleLogin;

            // Greeting Screen
            const continueBtn = document.getElementById('continue-btn');
            if (continueBtn) {
                continueBtn.onclick = () => {
                    currentScreen = 'flashcards';
                    renderApp();
                };
            }

            // Flashcards Screen
            const flashcardNextBtn = document.getElementById('flashcard-next-btn');
            if (flashcardNextBtn) {
                flashcardNextBtn.onclick = nextFlashcard;
            }

            // Home Screen Tabs
            const tabButtons = document.querySelectorAll('.tab-btn');
            tabButtons.forEach(btn => {
                btn.onclick = (e) => {
                    const newTab = e.currentTarget.dataset.tabId;
                    activeTab = newTab;
                    renderApp();
                };
            });

            // Chatbot
            const chatbotToggleBtn = document.getElementById('chatbot-toggle-btn');
            if (chatbotToggleBtn) {
                chatbotToggleBtn.onclick = () => {
                    showChatbot = true;
                    renderApp();
                    updateChatbox();
                };
            }
            const chatbotCloseBtn = document.getElementById('chatbot-close-btn');
            if (chatbotCloseBtn) {
                chatbotCloseBtn.onclick = () => {
                    showChatbot = false;
                    renderApp();
                };
            }
            const sendBtn = document.getElementById('send-btn');
            if (sendBtn) {
                sendBtn.onclick = sendMessage;
                const messageInput = document.getElementById('message-input');
                messageInput.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        sendMessage();
                    }
                };
            }

            // Geolocation button
            const getLocationBtn = document.getElementById('get-location-btn');
            if (getLocationBtn) {
                getLocationBtn.onclick = getLiveLocation;
            }
        }

        window.onload = function() {
            renderApp();
            // Initial chatbot message
            chatMessages = [{ type: 'bot', message: content[language].chatbot.initialMessage }];
        };
    </script>
</body>
</html>
